---
- name: Start WireMock
  community.docker.docker_container:
    name: wiremock
    image: wiremock/wiremock:latest
    state: started
    ports:
      - "{{ wire_mock_port }}:8443"
    volumes:
      - "{{ role_path }}/wiremock:/home/wiremock"
    env:
      WIREMOCK_OPTIONS: '--https-port 8443 --verbose'
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost:8443/__admin/health"]
      interval: 3s
      timeout: 2s
      retries: 5
    recreate: false
  when: mock_server

- name: Wait for WireMock
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ wire_mock_port }}"
    timeout: 6

- name: Get job info for existing job
  codefritzel.ganeti.gnt_job_info:
    rapi_address: "{{ ganeti_rapi_address }}"
    rapi_port: "{{ ganeti_rapi_port }}"
    rapi_username: "{{ ganeti_rapi_user }}"
    rapi_password: "{{ ganeti_rapi_password }}"
    ssl_verify: false
    job_id: 123
  register: job

- debug:
    var: job

- name: Verify job info was retrieved successfully
  assert:
    that:
      - job.job_info.id == 123
      - job.job_info.status == "success"

- name: Stop WireMock
  community.docker.docker_container:
    name: wiremock
    state: absent
    force_kill: true
  when: mock_server